name: Release APK

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Compute version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SHORT_HASH=$(git rev-parse --short=6 HEAD)
          echo "name=v${TAG}-${SHORT_HASH}" >> "$GITHUB_OUTPUT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          echo "code=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PheartwithClientVersionName="${{ steps.version.outputs.name }}" \
            -PheartwithClientVersionCode="${{ steps.version.outputs.code }}"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HRBroadcastLite-${{ steps.version.outputs.name }}-release
          path: app/build/outputs/apk/release/HRBroadcastLite-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HeartWith ${{ steps.version.outputs.name }}
          files: |
            app/build/outputs/apk/release/HRBroadcastLite-*.apk
          generate_release_notes: true